<!DOCTYPE html>
<html lang="en">
<head>

    <title>Trainee Dashboard</title>

    <link rel="stylesheet" href="css/dashbord.css">

</head>

<body class="trainee">

            <li onclick="showProfile()"><span class="icon">👤</span><span class="text">Profile</span></li>
            <li onclick="showBatches()"><span class="icon">📚</span><span class="text">Batches</span></li>

            </li>
